<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syntra — Finanzas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f7; --blanco: #ffffff; --texto: #1d1d1f; --suave: #6e6e73;
  --borde: #d2d2d7; --verde: #1d6f42; --verde-claro: #e8f5ee;
  --rojo: #c0392b; --rojo-claro: #fdecea; --azul: #0066cc;
  --sol: #f5a623; --sol-claro: #fdf3e0; --morado: #6b3fa0; --morado-claro: #f0ebf8;
  --naranja: #d35400; --naranja-claro: #fdf0e8;
}
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--texto); font-size: 14px; line-height: 1.5; min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* HEADER */
.header { background: rgba(245,245,247,0.85); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid var(--borde); padding: 0 32px; height: 52px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
.header-logo { font-size: 17px; font-weight: 600; letter-spacing: 4px; color: var(--texto); }
.header-title { font-size: 13px; color: var(--suave); }
.header-right { display: flex; align-items: center; gap: 12px; }
.conn-status { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 20px; }
.conn-ok { color: #34c759; }
.conn-err { color: var(--rojo); }
.conn-loading { color: var(--suave); }
.btn { padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
.btn-primary { background: var(--verde); color: white; }
.btn-primary:hover { background: #1a5f38; }
.btn-secondary { background: transparent; color: var(--texto); border: 1px solid var(--borde); }
.btn-secondary:hover { background: var(--bg); }
.btn-danger { background: var(--rojo-claro); color: var(--rojo); border: 1px solid var(--borde); }
.btn-ingreso { background: var(--verde); color: white; }
.btn-egreso { background: var(--rojo); color: white; }

/* TABS */
.tabs { background: var(--blanco); padding: 0 32px; display: flex; gap: 0; border-bottom: 1px solid var(--borde); }
.tab { padding: 14px 18px; font-size: 13px; font-weight: 400; color: var(--suave); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab.active { color: var(--texto); border-bottom-color: var(--texto); font-weight: 500; }
.tab:hover { color: var(--texto); }

/* MES SELECTOR */
.mes-selector { background: var(--blanco); border-bottom: 1px solid var(--borde); padding: 12px 32px; display: flex; align-items: center; gap: 12px; }
.mes-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--borde); background: var(--bg); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.mes-btn:hover { background: var(--borde); }
.mes-actual { font-weight: 500; font-size: 15px; min-width: 180px; text-align: center; letter-spacing: -0.2px; }
.mes-selector-right { margin-left: auto; }

/* CONTENIDO */
.contenido { padding: 24px 32px; max-width: 1100px; margin: 0 auto; }
.vista { display: none; }
.vista.active { display: block; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--borde); border: 1px solid var(--borde); border-radius: 16px; overflow: hidden; margin-bottom: 24px; }
.stat-card { background: var(--blanco); padding: 20px 22px; }
.stat-card:hover { background: #fafafa; }
.stat-label { font-size: 11px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; color: var(--suave); margin-bottom: 8px; }
.stat-valor { font-size: 26px; font-weight: 300; letter-spacing: -0.5px; line-height: 1; margin-bottom: 4px; }
.stat-sub { font-size: 12px; color: var(--suave); }
.stat-verde .stat-valor { color: var(--verde); }
.stat-rojo .stat-valor { color: var(--rojo); }
.stat-azul .stat-valor { color: var(--azul); }
.stat-sol .stat-valor { color: var(--sol); }

/* BALANCE CARD */
.balance-card { background: var(--texto); border-radius: 16px; padding: 22px 28px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
.balance-label { font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
.balance-valor { font-size: 36px; font-weight: 300; letter-spacing: -1px; line-height: 1; }
.balance-valor.positivo { color: #34c759; }
.balance-valor.negativo { color: #ff453a; }
.balance-right { display: flex; gap: 24px; }
.balance-item { text-align: right; }
.balance-item-label { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
.balance-item-valor { font-size: 15px; font-weight: 500; }
.balance-item-valor.ing { color: #34c759; }
.balance-item-valor.egr { color: #ff453a; }

/* MOVIMIENTOS */
.movimientos-container { background: var(--blanco); border-radius: 16px; border: 1px solid var(--borde); overflow: hidden; }
.mov-header { padding: 16px 20px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: space-between; }
.mov-titulo { font-weight: 500; font-size: 15px; letter-spacing: -0.2px; }
.mov-filtros { display: flex; gap: 4px; }
.filtro { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--borde); background: var(--bg); color: var(--suave); transition: all 0.15s; }
.filtro.active { background: var(--texto); color: white; border-color: var(--texto); }
.mov-item { display: grid; grid-template-columns: 90px 1fr auto auto auto; gap: 12px; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--bg); cursor: pointer; transition: background 0.1s; }
.mov-item:last-child { border-bottom: none; }
.mov-item:hover { background: var(--bg); }
.mov-fecha { font-size: 12px; color: var(--suave); }
.mov-concepto { font-weight: 500; font-size: 13px; margin-bottom: 2px; }
.mov-categoria { font-size: 11px; color: var(--suave); }
.mov-proyecto { font-size: 10px; font-weight: 500; color: var(--azul); background: #e8f0fb; padding: 2px 7px; border-radius: 4px; display: inline-block; margin-top: 2px; }
.mov-cuenta { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 6px; }
.cuenta-syntra { background: var(--verde-claro); color: var(--verde); }
.cuenta-efectivo { background: var(--sol-claro); color: #8B5E00; }
.mov-factura { font-size: 11px; font-weight: 500; }
.factura-si { color: var(--verde); }
.factura-no { color: var(--suave); }
.factura-pendiente { color: var(--sol); }
.mov-monto { font-weight: 600; font-size: 14px; text-align: right; white-space: nowrap; letter-spacing: -0.3px; }
.mov-monto.ingreso { color: var(--verde); }
.mov-monto.egreso { color: var(--rojo); }
.mov-empty { text-align: center; padding: 48px; color: var(--suave); font-size: 14px; }

/* CATEGORIAS */
.cat-badge { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; display: inline-block; }
.cat-pago-cliente { background: var(--verde-claro); color: var(--verde); }
.cat-pago-financiado { background: #e8f0fb; color: var(--azul); }
.cat-gasto-fijo { background: var(--morado-claro); color: var(--morado); }
.cat-proveedor { background: var(--sol-claro); color: #8B5E00; }
.cat-contratista { background: var(--naranja-claro); color: var(--naranja); }
.cat-tramite { background: #e8eaf6; color: #3949ab; }
.cat-comision { background: #fce4ec; color: #c2185b; }
.cat-otro { background: var(--bg); color: var(--suave); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--blanco); border-radius: 20px 20px 0 0; width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--borde); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--blanco); z-index: 1; }
.modal-titulo { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.modal-close { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); border: none; cursor: pointer; font-size: 14px; color: var(--suave); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--borde); display: flex; justify-content: flex-end; gap: 10px; background: var(--blanco); position: sticky; bottom: 0; }

/* TIPO SELECTOR */
.tipo-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.tipo-btn { padding: 14px; border-radius: 12px; border: 1.5px solid var(--borde); cursor: pointer; text-align: center; font-weight: 500; font-size: 15px; transition: all 0.15s; background: var(--bg); font-family: inherit; }
.tipo-btn.selected-ingreso { background: var(--verde-claro); border-color: var(--verde); color: var(--verde); }
.tipo-btn.selected-egreso { background: var(--rojo-claro); border-color: var(--rojo); color: var(--rojo); }

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-campo { display: flex; flex-direction: column; gap: 4px; }
.form-campo.full { grid-column: 1/-1; }
.form-campo label { font-size: 12px; font-weight: 500; color: var(--suave); }
.form-campo input, .form-campo select, .form-campo textarea { padding: 10px 12px; border: 1px solid var(--borde); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--bg); outline: none; transition: border 0.15s; width: 100%; }
.form-campo input:focus, .form-campo select:focus, .form-campo textarea:focus { border-color: var(--azul); background: var(--blanco); box-shadow: 0 0 0 3px rgba(0,102,204,0.1); }
.form-campo textarea { resize: vertical; min-height: 70px; }

/* DET */
.det-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.det-campo { background: var(--bg); border-radius: 10px; padding: 12px; }
.det-label { font-size: 11px; font-weight: 500; color: var(--suave); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.det-valor { font-size: 14px; font-weight: 400; }

/* RESUMEN */
.resumen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.resumen-card { background: var(--blanco); border-radius: 16px; border: 1px solid var(--borde); overflow: hidden; }
.resumen-card-header { padding: 12px 16px; font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--borde); }
.resumen-card-header.ing { color: var(--verde); }
.resumen-card-header.egr { color: var(--rojo); }
.resumen-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--bg); font-size: 13px; }
.resumen-row:last-child { border-bottom: none; }
.resumen-row-valor { font-weight: 500; }

/* ANUAL */
.anual-container { background: var(--blanco); border-radius: 16px; border: 1px solid var(--borde); overflow: hidden; margin-bottom: 20px; }
.anual-table { width: 100%; border-collapse: collapse; }
.anual-table th { padding: 10px 14px; text-align: right; font-size: 11px; font-weight: 500; color: var(--suave); background: var(--bg); white-space: nowrap; border-bottom: 1px solid var(--borde); }
.anual-table th:first-child { text-align: left; }
.anual-table td { padding: 10px 14px; font-size: 13px; text-align: right; border-bottom: 1px solid var(--bg); white-space: nowrap; }
.anual-table td:first-child { text-align: left; font-weight: 500; }
.anual-table tr:hover td { background: var(--bg); }
.anual-positivo { color: var(--verde); font-weight: 500; }
.anual-negativo { color: var(--rojo); font-weight: 500; }
.anual-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 20px; font-size: 14px; z-index: 999; display: none; backdrop-filter: blur(10px); }
.toast.show { display: block; }
.toast.error { }
.toast.success { }

/* LOADING */
.loading { text-align: center; padding: 48px; color: var(--suave); }
.loading-spinner { width: 24px; height: 24px; border: 2px solid var(--borde); border-top-color: var(--verde); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div style='display:flex;align-items:center;gap:12px'><div class="header-logo">SYNTRA</div><div class="header-title">Finanzas</div></div>
  </div>
  <div class="header-right">
    <span class="conn-status conn-loading" id="conn-status">● Conectando...</span>
    <button class="btn btn-primary" onclick="abrirNuevoMovimiento()">+ Registrar movimiento</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="mostrarVista('dashboard', this)">📊 Dashboard</div>
  <div class="tab" onclick="mostrarVista('movimientos', this)">📋 Movimientos</div>
  <div class="tab" onclick="mostrarVista('resumen', this)">📈 Resumen</div>
  <div class="tab" onclick="mostrarVista('anual', this)">📅 Anual</div>
</div>

<!-- MES SELECTOR -->
<div class="mes-selector">
  <button class="mes-btn" onclick="cambiarMes(-1)">‹</button>
  <div class="mes-actual" id="mes-display"></div>
  <button class="mes-btn" onclick="cambiarMes(1)">›</button>
  <div class="mes-selector-right">
    <button class="btn btn-secondary" style="font-size:11px" onclick="irAHoy()">Hoy</button>
  </div>
</div>

<div class="contenido">

  <!-- DASHBOARD -->
  <div class="vista active" id="vista-dashboard">
    <div id="balance-container"></div>
    <div class="stats-row" id="stats-row"></div>
    <div class="movimientos-container">
      <div class="mov-header">
        <div class="mov-titulo">Últimos movimientos</div>
      </div>
      <div id="ultimos-movimientos"></div>
    </div>
  </div>

  <!-- MOVIMIENTOS -->
  <div class="vista" id="vista-movimientos">
    <div class="movimientos-container">
      <div class="mov-header">
        <div class="mov-titulo">Todos los movimientos</div>
        <div class="mov-filtros">
          <div class="filtro active" onclick="filtrarMov('todos', this)">Todos</div>
          <div class="filtro" onclick="filtrarMov('ingreso', this)">Ingresos</div>
          <div class="filtro" onclick="filtrarMov('egreso', this)">Egresos</div>
        </div>
      </div>
      <div id="lista-movimientos"></div>

  <!-- RESUMEN -->
  <div class="vista" id="vista-resumen">
    <div id="resumen-contenido"></div>
  </div>

  <!-- ANUAL -->
  <div class="vista" id="vista-anual">
    <div id="anual-contenido"></div>
  </div>

</div>

<!-- MODAL NUEVO MOVIMIENTO -->
<div class="modal-overlay" id="modal-nuevo">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-titulo" id="modal-nuevo-titulo">Registrar movimiento</div>
      <button class="modal-close" onclick="cerrarModal('modal-nuevo')">✕</button>
    </div>
    <div class="modal-body">
      <!-- TIPO -->
      <div class="tipo-selector">
        <div class="tipo-btn" id="btn-ingreso" onclick="setTipo('ingreso')">💚 Ingreso</div>
        <div class="tipo-btn" id="btn-egreso" onclick="setTipo('egreso')">🔴 Egreso</div>
      </div>
      <div class="form-grid">
        <div class="form-campo full">
          <label>Concepto *</label>
          <input type="text" id="nm-concepto" placeholder="Ej. Pago anticipo Juan García">
        </div>
        <div class="form-campo">
          <label>Categoría *</label>
          <select id="nm-categoria"></select>
        </div>
        <div class="form-campo">
          <label>Monto ($) *</label>
          <input type="number" id="nm-monto" placeholder="0.00">
        </div>
        <div class="form-campo">
          <label>Fecha</label>
          <input type="date" id="nm-fecha">
        </div>
        <div class="form-campo">
          <label>Cuenta</label>
          <select id="nm-cuenta">
            <option value="syntra">Syntra (Banco)</option>
            <option value="efectivo">Efectivo</option>
          </select>
        </div>
        <div class="form-campo">
          <label>Factura</label>
          <select id="nm-factura">
            <option value="no">Sin factura</option>
            <option value="si">Con factura</option>
            <option value="pendiente">Pendiente</option>
          </select>
        </div>
        <div class="form-campo full">
          <label>Proyecto relacionado (opcional)</label>
          <select id="nm-proyecto">
            <option value="">— Sin proyecto —</option>
          </select>

          <label>Notas</label>

        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="cerrarModal('modal-nuevo')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarMovimiento()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal-detalle">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-titulo" id="det-titulo"></div>
      <button class="modal-close" onclick="cerrarModal('modal-detalle')">✕</button>
    </div>
    <div class="modal-body" id="det-body"></div>
    <div class="modal-footer" id="det-footer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ypmkuroqjhgidqpjhvtj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwbWt1cm9xamhnaWRxcGpodnRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTk2MTcsImV4cCI6MjA5NTU3NTYxN30.4yhzqtKRlWJNMbxUyXnTonIicdh8Ose1geHI7wBQlws';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const CATEGORIAS_INGRESO = [
  { value: 'pago-cliente', label: 'Pago de cliente (proyecto)', clase: 'cat-pago-cliente' },
  { value: 'pago-financiado', label: 'Pago mensualidad (financiado)', clase: 'cat-pago-financiado' },
  { value: 'otro-ingreso', label: 'Otro ingreso', clase: 'cat-otro' },
];
const CATEGORIAS_EGRESO = [
  { value: 'gasto-fijo', label: 'Gasto fijo mensual', clase: 'cat-gasto-fijo' },
  { value: 'proveedor', label: 'Compra a proveedor', clase: 'cat-proveedor' },
  { value: 'contratista', label: 'Pago a contratista', clase: 'cat-contratista' },
  { value: 'tramite', label: 'Pago de trámite', clase: 'cat-tramite' },
  { value: 'comision', label: 'Comisión vendedor', clase: 'cat-comision' },
  { value: 'otro-egreso', label: 'Otros gastos', clase: 'cat-otro' },
];

let movimientos = [];
let proyectos = [];
let tipoSeleccionado = 'ingreso';
let filtroActual = 'todos';
let vistaActual = 'dashboard';
let mesActual = new Date();
mesActual.setDate(1);

const fmt = n => '$' + Number(n||0).toLocaleString('es-MX', {minimumFractionDigits:0, maximumFractionDigits:0});
const fmtFecha = f => f ? new Date(f + 'T12:00:00').toLocaleDateString('es-MX', {day:'numeric', month:'short'}) : '—';

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3000);
}

function getMesRango() {
  const inicio = new Date(mesActual.getFullYear(), mesActual.getMonth(), 1);
  const fin = new Date(mesActual.getFullYear(), mesActual.getMonth() + 1, 0);
  return {
    inicio: inicio.toISOString().split('T')[0],
    fin: fin.toISOString().split('T')[0]
  };
}

function updateMesDisplay() {
  document.getElementById('mes-display').textContent =
    mesActual.toLocaleDateString('es-MX', { month: 'long', year: 'numeric' })
    .replace(/^\w/, c => c.toUpperCase());
}

function cambiarMes(dir) {
  mesActual.setMonth(mesActual.getMonth() + dir);
  updateMesDisplay();
  cargarMovimientos();
}

function irAHoy() {
  mesActual = new Date();
  mesActual.setDate(1);
  updateMesDisplay();
  cargarMovimientos();
}

async function cargarMovimientos() {
  const { inicio, fin } = getMesRango();
  const { data, error } = await db
    .from('movimientos')
    .select('*, proyectos(id, clientes(nombre))')
    .gte('fecha', inicio)
    .lte('fecha', fin)
    .order('fecha', { ascending: false });
  if (error) { showToast('Error al cargar movimientos', 'error'); return; }
  movimientos = data || [];
  renderTodo();
}

async function cargarProyectos() {
  const { data } = await db.from('proyectos').select('id, clientes(nombre)').lt('etapa', 8).order('created_at', { ascending: false });

      proyectos.map(p => `<option value="${p.id}">${p.clientes?.nombre || 'Sin nombre'}</option>`).join('');

function getCatLabel(value) {
  return [...CATEGORIAS_INGRESO, ...CATEGORIAS_EGRESO].find(c => c.value === value)?.label || value;
}
function getCatClase(value) {
  return [...CATEGORIAS_INGRESO, ...CATEGORIAS_EGRESO].find(c => c.value === value)?.clase || 'cat-otro';
}

          <div class="balance-item-valor ing">${fmt(ingresos)}</div>
        </div>
        <div class="balance-item">
          <div class="balance-item-label">Egresos</div>
          <div class="balance-item-valor egr">${fmt(egresos)}</div>

function renderStats() {

function renderResumen() {
  const ingresos = movimientos.filter(m => m.tipo === 'ingreso');
  const egresos = movimientos.filter(m => m.tipo === 'egreso');

  const agrupar = (lista, cats) => cats.map(c => ({
    label: c.label,
    total: lista.filter(m => m.categoria === c.value).reduce((s,m) => s + (m.monto||0), 0),
    count: lista.filter(m => m.categoria === c.value).length,
  })).filter(x => x.total > 0);

  const resIngr = agrupar(ingresos, CATEGORIAS_INGRESO);
  const resEgr = agrupar(egresos, CATEGORIAS_EGRESO);
  const totalIngr = ingresos.reduce((s,m) => s + (m.monto||0), 0);
  const totalEgr = egresos.reduce((s,m) => s + (m.monto||0), 0);

  document.getElementById('resumen-contenido').innerHTML = `
    <div class="resumen-grid">
      <div class="resumen-card">
        <div class="resumen-card-header ing">📈 Ingresos por categoría</div>
        ${resIngr.length === 0 ? '<div style="padding:16px;color:var(--suave);font-size:13px">Sin ingresos</div>' :
          resIngr.map(r => `<div class="resumen-row">
            <div class="resumen-row-label">${r.label} <span style="color:var(--suave);font-size:11px">(${r.count})</span></div>
            <div class="resumen-row-valor" style="color:var(--verde)">${fmt(r.total)}</div>
          </div>`).join('')}
        <div class="resumen-row" style="background:var(--verde-claro)">
          <div style="font-weight:700">Total ingresos</div>
          <div style="font-weight:700;color:var(--verde)">${fmt(totalIngr)}</div>
        </div>
      </div>
      <div class="resumen-card">
        <div class="resumen-card-header egr">📉 Egresos por categoría</div>
        ${resEgr.length === 0 ? '<div style="padding:16px;color:var(--suave);font-size:13px">Sin egresos</div>' :
          resEgr.map(r => `<div class="resumen-row">
            <div class="resumen-row-label">${r.label} <span style="color:var(--suave);font-size:11px">(${r.count})</span></div>
            <div class="resumen-row-valor" style="color:var(--rojo)">${fmt(r.total)}</div>
          </div>`).join('')}
        <div class="resumen-row" style="background:var(--rojo-claro)">
          <div style="font-weight:700">Total egresos</div>
          <div style="font-weight:700;color:var(--rojo)">${fmt(totalEgr)}</div>
        </div>
      </div>
    </div>
    <div class="balance-card">
      <div class="balance-left">
        <div class="balance-label">Balance del mes</div>
        <div class="balance-valor ${totalIngr - totalEgr >= 0 ? 'positivo' : 'negativo'}">${fmt(totalIngr - totalEgr)}</div>
      </div>
    </div>`;
}

async function renderAnual() {
  const anioActual = new Date().getFullYear();
  const el = document.getElementById('anual-contenido');
  el.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Cargando resumen anual...</div>';

  const { data, error } = await db
    .from('movimientos')
    .select('*')
    .gte('fecha', `${anioActual}-01-01`)
    .lte('fecha', `${anioActual}-12-31`);

  if (error) { el.innerHTML = '<div style="padding:32px;text-align:center;color:var(--suave)">Error al cargar datos</div>'; return; }

  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const mesActualNum = new Date().getMonth();

  // Agrupar por mes
  const porMes = Array.from({length: 12}, (_, i) => {
    const movs = (data || []).filter(m => new Date(m.fecha + 'T12:00:00').getMonth() === i);
    const gastosFijos = movs.filter(m => m.tipo === 'egreso' && m.categoria === 'gasto-fijo').reduce((s,m) => s + (m.monto||0), 0);
    const gastosVariables = movs.filter(m => m.tipo === 'egreso' && m.categoria !== 'gasto-fijo').reduce((s,m) => s + (m.monto||0), 0);
    const ingresosBanco = movs.filter(m => m.tipo === 'ingreso' && m.cuenta === 'syntra').reduce((s,m) => s + (m.monto||0), 0);
    const ingresosEfectivo = movs.filter(m => m.tipo === 'ingreso' && m.cuenta === 'efectivo').reduce((s,m) => s + (m.monto||0), 0);
    const totalIngresos = ingresosBanco + ingresosEfectivo;
    const totalEgresos = gastosFijos + gastosVariables;
    const balance = totalIngresos - totalEgresos;
    return { gastosFijos, gastosVariables, ingresosBanco, ingresosEfectivo, totalIngresos, totalEgresos, balance, tieneData: movs.length > 0 };
  });

  const totales = {
    gastosFijos: porMes.reduce((s,m) => s + m.gastosFijos, 0),
    gastosVariables: porMes.reduce((s,m) => s + m.gastosVariables, 0),
    ingresosBanco: porMes.reduce((s,m) => s + m.ingresosBanco, 0),
    ingresosEfectivo: porMes.reduce((s,m) => s + m.ingresosEfectivo, 0),
    totalIngresos: porMes.reduce((s,m) => s + m.totalIngresos, 0),
    totalEgresos: porMes.reduce((s,m) => s + m.totalEgresos, 0),
    balance: porMes.reduce((s,m) => s + m.balance, 0),
  };

  const mesesConData = porMes.filter(m => m.tieneData).length;

  const fmtC = n => n === 0 ? '—' : fmt(n);
  const fmtBal = n => n === 0 ? '—' : `<span class="${n >= 0 ? 'anual-positivo' : 'anual-negativo'}">${fmt(n)}</span>`;

  const filas = [
    { label: '💰 Ingresos totales', key: 'totalIngresos', color: 'var(--verde)' },
    { label: '&nbsp;&nbsp;└ Banco (Syntra)', key: 'ingresosBanco', color: '' },
    { label: '&nbsp;&nbsp;└ Efectivo', key: 'ingresosEfectivo', color: '' },
    { label: '💸 Egresos totales', key: 'totalEgresos', color: 'var(--rojo)' },
    { label: '&nbsp;&nbsp;└ Gastos fijos', key: 'gastosFijos', color: '' },
    { label: '&nbsp;&nbsp;└ Gastos variables', key: 'gastosVariables', color: '' },
  ];

  el.innerHTML = `
    <div class="anual-stats">
      <div class="stat-card stat-verde">
        <div class="stat-label">Ingresos ${anioActual}</div>
        <div class="stat-valor" style="font-size:18px">${fmt(totales.totalIngresos)}</div>
        <div class="stat-sub">${mesesConData} meses registrados</div>
      </div>
      <div class="stat-card stat-rojo">
        <div class="stat-label">Egresos ${anioActual}</div>
        <div class="stat-valor" style="font-size:18px">${fmt(totales.totalEgresos)}</div>
        <div class="stat-sub">Fijos + Variables</div>
      </div>
      <div class="stat-card ${totales.balance >= 0 ? 'stat-verde' : 'stat-rojo'}">
        <div class="stat-label">Balance ${anioActual}</div>
        <div class="stat-valor" style="font-size:18px;color:${totales.balance >= 0 ? 'var(--verde)' : 'var(--rojo)'}">${fmt(totales.balance)}</div>
        <div class="stat-sub">${totales.balance >= 0 ? 'Positivo ✓' : 'Negativo ⚠️'}</div>
      </div>
    </div>
    <div class="anual-container">
      <div style="padding:16px 20px;border-bottom:1px solid var(--gris-med);font-weight:700;font-size:15px">Resultados anuales ${anioActual}</div>
      <div style="overflow-x:auto">
        <table class="anual-table">
          <thead>
            <tr>
              <th>Concepto</th>
              ${MESES.map((m, i) => `<th style="color:${i === mesActualNum ? 'var(--verde)' : ''}">${m.substring(0,3)}</th>`).join('')}
              <th style="color:var(--negro)">Total</th>
            </tr>
          </thead>
          <tbody>
            ${filas.map(f => `
              <tr>
                <td style="color:${f.color||'inherit'}">${f.label}</td>
                ${porMes.map(m => `<td style="color:${f.color||'inherit'}">${fmtC(m[f.key])}</td>`).join('')}
                <td style="font-weight:700;color:${f.color||'inherit'}">${fmtC(totales[f.key])}</td>
              </tr>`).join('')}
            <tr>
              <td colspan="${14}" style="padding:0;border-bottom:2px solid var(--gris-med)"></td>
            </tr>
            <tr>
              <td style="font-weight:700">📊 Balance mensual</td>
              ${porMes.map(m => `<td>${fmtBal(m.balance)}</td>`).join('')}
              <td>${fmtBal(totales.balance)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

async function abrirNuevoMovimiento() {
  tipoSeleccionado = 'ingreso';
  await cargarProyectos();
  setTipo('ingreso');
  document.getElementById('nm-fecha').value = new Date().toISOString().split('T')[0];
  ['nm-concepto','nm-monto','nm-notas'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal-nuevo').classList.add('open');
}

async function guardarMovimiento() {
  const concepto = document.getElementById('nm-concepto').value.trim();
  const monto = parseFloat(document.getElementById('nm-monto').value)||0;
  if (!concepto || !monto) { showToast('Concepto y monto son obligatorios', 'error'); return; }

  const proyId = document.getElementById('nm-proyecto').value;
  const movData = {
    tipo: tipoSeleccionado,
    concepto,
    categoria: document.getElementById('nm-categoria').value,
    monto,
    fecha: document.getElementById('nm-fecha').value,
    cuenta: document.getElementById('nm-cuenta').value,
    tiene_factura: document.getElementById('nm-factura').value,
    proyecto_id: proyId ? parseInt(proyId) : null,
    notas: document.getElementById('nm-notas').value,
  };

  const { error } = await db.from('movimientos').insert(movData);
  if (error) { showToast('Error al guardar', 'error'); return; }

  // Si es pago de cliente vinculado a proyecto, actualizar cobrado
  if (proyId && (movData.categoria === 'pago-cliente' || movData.categoria === 'pago-financiado')) {
    const proy = proyectos.find(p => p.id === parseInt(proyId));
    if (proy) {
      const { data: proyData } = await db.from('proyectos').select('cobrado').eq('id', parseInt(proyId)).single();
      if (proyData) {
        const nuevoCobrado = (proyData.cobrado || 0) + monto;
        await db.from('proyectos').update({ cobrado: nuevoCobrado }).eq('id', parseInt(proyId));
        showToast(`Pago registrado y proyecto "${proy.clientes?.nombre}" actualizado ✓`, 'success');
      }
    }
  } else {
    showToast('Movimiento registrado ✓', 'success');
  }

  cerrarModal('modal-nuevo');
  await cargarMovimientos();
}

async function guardarEdicionMovimiento(id) {
  const updates = {
    concepto: document.getElementById('ed-concepto').value.trim(),
    monto: parseFloat(document.getElementById('ed-monto').value)||0,
    fecha: document.getElementById('ed-fecha').value,
    cuenta: document.getElementById('ed-cuenta').value,
    tiene_factura: document.getElementById('ed-factura').value,
    notas: document.getElementById('ed-notas').value,
  };
  if (!updates.concepto) { showToast('El concepto es obligatorio', 'error'); return; }
  const { error } = await db.from('movimientos').update(updates).eq('id', id);
  if (error) { showToast('Error al guardar', 'error'); return; }
  showToast('Movimiento actualizado ✓', 'success');
  cerrarModal('modal-detalle');
  await cargarMovimientos();
}

async function eliminarMovimiento(id) {
  if (!confirm('¿Eliminar este movimiento?')) return;
  const { error } = await db.from('movimientos').delete().eq('id', id);
  if (error) { showToast('Error al eliminar', 'error'); return; }
  showToast('Movimiento eliminado', '');
  cerrarModal('modal-detalle');
  await cargarMovimientos();
}

    const { error } = await db.from('movimientos').select('count').limit(1);
    if (error) throw error;
    statusEl.textContent = '● Conectado';
    statusEl.className = 'conn-status conn-ok';
    await cargarMovimientos();
  } catch(e) {
    statusEl.textContent = '● Sin conexión';
    statusEl.className = 'conn-status conn-err';
    showToast('Error de conexión', 'error');
  }
})();
</script>
</body>
</html>
